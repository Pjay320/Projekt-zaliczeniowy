version: '3.8'

services:
  db:
    image: postgres:15
    container_name: nbp_database
    environment:
      - POSTGRES_USER=nbp_user
      - POSTGRES_PASSWORD=nbp_password
      - POSTGRES_DB=nbp_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: nbp_backend
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  postgres_data: