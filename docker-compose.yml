version: '3.8'

services:
  db:
    image: postgres:15
    container_name: nbp_database
    environment:
      - POSTGRES_USER=nbp_user
      - POSTGRES_PASSWORD=nbp_password
      - POSTGRES_DB=nbp_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: