services:
  db:
    image: postgres:15
    container_name: nbp_database
    environment:
      - POSTGRES_USER=nbp_user
      - POSTGRES_PASSWORD=nbp_password
      - POSTGRES_DB=nbp_db
    ports:
      - "5433:5432" 
    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nbp_user -d nbp_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: nbp_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
 
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: nbp_frontend
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - /app/node_modules 
    depends_on:
      - backend

volumes:
  postgres_data: